<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candle Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">🕯️ Candle Shop</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto me-3">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
        <!-- Cart Button -->
        <button class="btn btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#cartCanvas">
          🛒 Cart (<span id="cartCount">0</span>)
        </button>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="py-5 text-center bg-light shadow-sm">
    <div class="container">
      <h1 class="fw-bold">Welcome to Our Candle Shop</h1>
      <p class="lead text-muted">Handmade scented candles to brighten your home ✨</p>
    </div>
  </header>

  <!-- Products Section -->
  <section class="container my-5">
    <div id="products" class="row g-4"></div>
  </section>

  <!-- Cart Sidebar -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartCanvas">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Shopping Cart</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
      <ul id="cartList" class="list-unstyled"></ul>
      <div class="mt-3 border-top pt-3">
        <p class="fw-bold">Total: <span id="cartTotal">0</span> EGP</p>
        <button class="btn btn-success w-100" onclick="checkout()">Checkout</button>
      </div>
    </div>
  </div>

  <!-- Modal لعرض الألوان -->
  <div class="modal fade" id="colorModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Available Colors</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="colorOptions"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center text-muted small py-3 bg-dark text-light">
    © <span id="year"></span> Candle Shop — All Rights Reserved
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
